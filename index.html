<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣歷史雨量查詢</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/zh.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155; --line2:#3e4d68;
    --ink:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --accent2:#0ea5e9; --green:#16a34a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px}
  header{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  header h1{font-size:19px;margin:0;font-weight:700}
  header .sub{color:var(--muted);font-size:12.5px}

  /* 頂部工具列：全域控制 */
  .topbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:12px 22px;border-bottom:1px solid var(--line);background:#172033}
  .tgrp{display:flex;align-items:center;gap:9px}
  .tgrp .lab{font-size:12px;color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden}
  .seg button{padding:8px 14px;background:var(--panel2);border:0;color:var(--muted);cursor:pointer;font-size:13px}
  .seg button.on{background:var(--accent2);color:#fff;font-weight:600}
  .spacer{flex:1}
  .go{padding:9px 22px;background:var(--accent);border:0;border-radius:9px;color:#04243a;font-weight:700;font-size:14px;cursor:pointer}
  .go:hover{background:#7dd3fc}
  .xbtn{padding:9px 16px;background:var(--green);border:0;border-radius:9px;color:#fff;cursor:pointer;font-size:13px;font-weight:600}
  .xbtn:hover{background:#22c55e}
  .xbtn[disabled]{opacity:.4;cursor:not-allowed}
  .csv{padding:9px 14px;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;color:var(--ink);cursor:pointer;font-size:13px}
  .csv[disabled]{opacity:.4;cursor:not-allowed}

  /* 舞台：地圖滿版當底，控制面板與結果面板浮在上面 */
  #stage{position:relative;height:calc(100vh - 124px);overflow:hidden}
  #map{position:absolute;inset:0;background:#1a2436;z-index:1}
  .floatpanel{position:absolute;top:16px;left:16px;width:344px;max-height:calc(100% - 32px);
    background:rgba(15,23,42,.86);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line2);border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.45);
    z-index:500;display:flex;flex-direction:column;overflow:hidden}
  .fp-head{padding:13px 18px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink);
    display:flex;align-items:center;gap:7px}
  .fp-head .pin{font-size:15px}
  .panel{padding:16px 18px;overflow:auto}

  /* 結果底部抽屜 */
  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:600;background:var(--panel);
    border-top:1px solid var(--line2);border-radius:18px 18px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.5);
    transform:translateY(101%);transition:transform .32s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;height:62vh}
  #sheet.show{transform:translateY(0)}
  #sheet.full{height:90vh}
  .sheet-grab{position:relative;display:flex;align-items:center;gap:10px;padding:14px 22px 10px;border-bottom:1px solid var(--line);cursor:pointer;flex:0 0 auto}
  .sheet-grab .bar{position:absolute;left:50%;top:6px;transform:translateX(-50%);width:42px;height:4px;border-radius:3px;background:var(--line2)}
  .sheet-title{font-size:14px;font-weight:600;flex:1}
  .sheet-actions{display:flex;gap:8px}
  .sheet-actions button{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);border-radius:8px;cursor:pointer;font-size:13px;padding:6px 12px}
  .sheet-actions button:hover{border-color:var(--accent)}
  .sheet-body{padding:18px 24px;overflow:auto;flex:1;min-height:0}

  .ptitle{font-size:13px;font-weight:600;color:var(--ink);margin:2px 0 12px;display:flex;align-items:center;gap:7px}
  .ptitle .badge{font-size:11px;color:var(--muted);font-weight:400}
  label{display:block;font-size:12px;color:var(--muted);margin:11px 0 5px}
  label:first-of-type{margin-top:0}
  select,input{width:100%;padding:9px 11px;background:var(--panel2);border:1px solid var(--line2);
    border-radius:9px;color:var(--ink);font-size:14px}
  .row{display:flex;gap:9px}.row>div{flex:1}
  .addrow{display:flex;gap:8px;margin-top:8px}
  .addrow .ico{flex:0 0 auto;padding:9px 14px;background:var(--panel2);border:1px solid var(--line2);
    border-radius:9px;color:var(--accent);cursor:pointer;font-size:14px;font-weight:600}
  .addrow .ico:hover{border-color:var(--accent)}

  /* chips */
  .chips{display:flex;flex-direction:column;gap:7px;margin-top:12px}
  .chip{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--panel);
    border:1px solid var(--line2);border-radius:10px}
  .chip .dot{width:11px;height:11px;border-radius:50%;flex:0 0 11px}
  .chip .t{flex:1;font-size:13px;line-height:1.35;overflow:hidden}
  .chip .t .sub{color:var(--muted);font-size:11px}
  .chip .x{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;padding:0 3px}
  .chip .x:hover{color:#f87171}
  .empty-chip{color:var(--muted);font-size:12px;padding:11px;border:1px dashed var(--line2);border-radius:10px;text-align:center;margin-top:10px}
  .tip{color:var(--muted);font-size:11.5px;margin-top:10px;line-height:1.6}
  /* flatpickr：吃滿寬、配深色 */
  .flatpickr-input{cursor:pointer;background:var(--panel2)}
  .flatpickr-calendar{background:#1e293b;box-shadow:0 8px 28px rgba(0,0,0,.5);border:1px solid var(--line2)}
  .flatpickr-day{color:var(--ink)}
  .flatpickr-day.inRange,.flatpickr-day.selected,.flatpickr-day.startRange,.flatpickr-day.endRange{
    background:var(--accent2);border-color:var(--accent2);box-shadow:none}
  .flatpickr-day.inRange{background:#1e3a52;border-color:#1e3a52}
  .flatpickr-months .flatpickr-month,.flatpickr-weekdays,span.flatpickr-weekday{color:var(--muted);fill:var(--muted)}
  /* 測站群組泡泡：統一藍色系 */
  .marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(59,130,246,.32)!important}
  .marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:rgba(37,99,235,.9)!important;color:#fff!important;font-weight:600}

  /* 右側結果 */
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
  .lg{display:flex;align-items:center;gap:8px;font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 13px}
  .lg .dot{width:11px;height:11px;border-radius:50%}
  .lg b{font-weight:600}.lg .s{color:var(--muted);font-size:11.5px}
  .chartbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;height:clamp(300px,44vh,560px)}
  .meta{color:var(--muted);font-size:12.5px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:7px 11px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--panel)}
  thead th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-weight:600}
  .tablebox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:0 14px 14px;max-height:430px;overflow:auto}
  .wet{color:#7dd3fc}
  .lvbadge{display:inline-block;padding:2px 9px;border-radius:20px;color:#0b1220;font-size:12px;font-weight:700}
  .empty{color:var(--muted);text-align:center;padding:80px 24px;line-height:2}
  /* ---------- 手機版：改上下堆疊、面板整寬、結果接續捲動 ---------- */
  @media(max-width:760px){
    header{padding:12px 14px}
    header h1{font-size:17px}
    header .sub{display:none}
    .topbar{padding:9px 12px;gap:12px}
    .topbar .lab{display:none}                 /* 標籤省略、按鈕自明 */
    .seg button{padding:8px 11px;font-size:13px}
    .spacer{flex-basis:100%;height:0}          /* 強制換行，讓查詢/匯出到下一排 */
    #elem{min-width:88px}
    .go{flex:1}                                 /* 查詢鍵放大好按 */

    #stage{position:static;height:auto;overflow:visible;display:flex;flex-direction:column}
    #map{position:static;inset:auto;height:46vh;min-height:280px;order:2}
    .floatpanel{position:static;width:auto;max-height:none;margin:0;border:0;border-bottom:1px solid var(--line);
      border-radius:0;box-shadow:none;background:var(--panel);backdrop-filter:none;-webkit-backdrop-filter:none;order:1}
    .panel{padding:14px 14px 16px}
    /* 結果抽屜：手機改成一般區塊接在下面，不用浮層 */
    #sheet{position:static;transform:none;height:auto;border-radius:0;box-shadow:none;border-top:8px solid var(--bg);order:3}
    #sheet .sheet-grab{display:none}
    .sheet-body{padding:14px}
    .chartbox{height:300px;padding:12px}
    .legend{gap:8px}.lg{padding:7px 10px}
    .tablebox{max-height:340px}
    th,td{padding:6px 8px;font-size:12px}
  }
  @media(max-width:400px){ .seg button{padding:7px 8px;font-size:12px} .topbar{gap:8px} }
</style>
</head>
<body>
<header>
  <h1>🌧️ 台灣歷史雨量查詢</h1>
  <span class="sub">中央氣象署 CODiS　·　全測站逐日／逐月／逐時</span>
</header>

<!-- 全域工具列 -->
<div class="topbar">
  <div class="tgrp">
    <span class="lab">模式</span>
    <div class="seg" id="mode">
      <button data-m="multi" class="on">多站比較</button>
      <button data-m="year">跨年同期</button>
      <button data-m="period">多時段</button>
      <button data-m="disaster">災害分析</button>
      <button data-m="rank">全台排行</button>
    </div>
  </div>
  <div class="tgrp">
    <span class="lab">要素</span>
    <select id="elem" style="width:auto;min-width:104px;padding:8px 12px"></select>
  </div>
  <div class="tgrp">
    <span class="lab">顆粒</span>
    <div class="seg" id="gran">
      <button data-g="day" class="on">逐日</button>
      <button data-g="month">逐月</button>
      <button data-g="hour">逐時</button>
    </div>
  </div>
  <div class="spacer"></div>
  <button class="csv" id="share">🔗 分享</button>
  <button class="csv" id="png" disabled>🖼 圖片</button>
  <button class="csv" id="csv" disabled>CSV</button>
  <button class="xbtn" id="xlsx" disabled>⬇ 匯出 Excel</button>
  <button class="go" id="go">查詢</button>
</div>

<div id="stage">
  <div id="map"></div>
  <div class="floatpanel">
    <div class="fp-head"><span class="pin">🎯</span> 選擇查詢條件</div>
    <div class="panel" id="panel"><!-- 依模式動態 --></div>
  </div>
  <div id="sheet">
    <div class="sheet-grab" id="sheetGrab">
      <span class="bar"></span>
      <span class="sheet-title" id="sheetTitle">查詢結果</span>
      <span class="sheet-actions">
        <button id="sheetToggle">展開 ⤢</button>
        <button id="sheetClose">收起 ×</button>
      </span>
    </div>
    <div class="sheet-body" id="result"></div>
  </div>
</div>

<script>
// 本機(serve.py)在 /web/index.html → ../data；GitHub Pages 放根目錄 → data
const DATA_BASE = location.pathname.includes("/web/") ? "../data" : "data";
// 非本機 = 雲端(GitHub Pages)：逐時改打 Render 後端代抓
const STATIC = !/^(localhost|127\.|0\.0\.0\.0|\[?::1)/.test(location.hostname);
const HOURLY_BASE = STATIC ? "https://tw-rainfall-api.onrender.com" : "";  // 雲端逐時後端
function hourBackendMsg(){ return `<div class="empty">🕐 逐時後端沒有回應。<br>可能是免費後端<b>正在喚醒（首次約 30-60 秒）</b>，稍候再按一次查詢；<br>或後端尚未部署——本機版(serve.py)一定可用。</div>`; }
const COLORS=["#38bdf8","#fb923c","#a78bfa","#34d399","#f472b6","#facc15","#60a5fa","#f87171"];
// 要素：idx 對應 data/daily 陣列順序；agg=逐月彙總方式；chart=圖型
const ELEMS=[
  {k:"p",    name:"雨量",   unit:"mm", idx:0, agg:"sum",  chart:"bar"},
  {k:"tmax", name:"最高溫", unit:"°C", idx:1, agg:"max",  chart:"line"},
  {k:"tmin", name:"最低溫", unit:"°C", idx:2, agg:"min",  chart:"line"},
  {k:"tavg", name:"平均溫", unit:"°C", idx:3, agg:"mean", chart:"line"},
  {k:"rh",   name:"濕度",   unit:"%",  idx:4, agg:"mean", chart:"line"},
  {k:"pres", name:"氣壓",   unit:"hPa",idx:5, agg:"mean", chart:"line"},
  {k:"wmean",name:"平均風速",unit:"m/s",idx:6, agg:"mean", chart:"line"},
  {k:"gust", name:"最大陣風",unit:"m/s",idx:7, agg:"max",  chart:"line"},
  {k:"wdir", name:"盛行風向",unit:"°",  idx:8, agg:"mean", chart:"line"},
  {k:"sun",  name:"日照時數",unit:"hr", idx:9, agg:"sum",  chart:"bar"},
];
let curElem=ELEMS[0];
// 災害門檻（氣象署官方）：dir 預設 above；溫度低溫為 below
const THRESH={
  p_day:[{v:80,l:"大雨",c:"#fde047"},{v:200,l:"豪雨",c:"#fb923c"},{v:350,l:"大豪雨",c:"#ef4444"},{v:500,l:"超大豪雨",c:"#c026d3"}],
  p_hour:[{v:40,l:"大雨(時雨≥40)",c:"#fde047"},{v:100,l:"極端時雨≥100",c:"#ef4444"}],
  gust:[{v:13.9,l:"7級強風",c:"#fde047"},{v:17.2,l:"8級",c:"#fb923c"},{v:24.5,l:"10級災害級",c:"#ef4444"},{v:32.7,l:"12級颶風",c:"#c026d3"}],
  wmean:[{v:10.8,l:"6級風",c:"#fde047"},{v:17.2,l:"8級強風",c:"#fb923c"}],
  tmax:[{v:36,l:"高溫黃燈",c:"#fb923c"},{v:38,l:"高溫紅燈",c:"#ef4444"}],
  tmin:[{v:10,l:"低溫≤10°C",c:"#60a5fa",dir:"below"},{v:5,l:"嚴寒≤5°C",c:"#2563eb",dir:"below"}],
};
function curThresholds(){
  if(curElem.k==="p") return gran==="hour"?THRESH.p_hour:THRESH.p_day;
  return THRESH[curElem.k]||null;
}
function classify(val,ths){
  if(typeof val!=="number"||!ths) return null;
  let hit=null;
  for(const t of ths){ const below=t.dir==="below";
    if(below? val<=t.v : val>=t.v) hit=t; }
  return hit;
}
let STATIONS=[], byId={}, counties=[];
let mode="multi", gran="day";
let chart=null, lastRender=null;
const dailyCache={}, hourlyCache={};

// 各模式狀態
const G = {
  multi:  { stations:[], start:"", end:"" },               // 多站、共用時間
  year:   { station:null, tmplS:"", tmplE:"", years:[] },  // 範本期間(完整日期，只取月-日)
  period: { station:null, periods:[], addS:"", addE:"" },  // [{start,end}]
  disaster:{ station:null, start:"", end:"" },             // 單站+範圍 災害分析
  rank:   { county:"", start:"", end:"" },                 // 全台排行 + 地圖熱度
};

const $=s=>document.querySelector(s);
const pad=n=>String(n).padStart(2,"0");
const lastDayOf=ym=>{const[y,m]=ym.split("-").map(Number);return `${ym}-${pad(new Date(y,m,0).getDate())}`;};

async function boot(){
  try{ STATIONS=await (await fetch(`${DATA_BASE}/stations.json`)).json(); }
  catch(e){ $("#result").innerHTML=`<div class="empty">讀不到測站清單。請用 <b>serve.py</b> 啟動伺服器後從 http://localhost 開啟。</div>`; return; }
  byId=Object.fromEntries(STATIONS.map(s=>[s.id,s]));
  counties=[...new Set(STATIONS.map(s=>s.county).filter(Boolean))].sort();
  $("#elem").innerHTML=ELEMS.map((e,i)=>`<option value="${i}">${e.name}</option>`).join("");
  $("#elem").onchange=ev=>{ curElem=ELEMS[+ev.target.value]; };
  const t=new Date(), y=t.getFullYear();
  G.multi.start=`${y-1}-${pad(t.getMonth()+1)}-01`;
  G.multi.end=t.toISOString().slice(0,10);
  G.year.years=[y-2,y-1,y];
  G.year.tmplS=`${y-1}-06-01`; G.year.tmplE=`${y-1}-06-30`;
  G.disaster.start=G.multi.start; G.disaster.end=G.multi.end;
  G.rank.start=G.multi.start; G.rank.end=G.multi.end;
  const restored=applyShareUrl();      // 若網址帶查詢參數，先還原狀態
  initMap(); renderPanel();
  wireExtras();                        // 分享 / 圖片 按鈕
  if(restored) runQuery();             // 分享連結進來 → 自動查一次
}

/* ---------------- 地圖 ---------------- */
let map,cluster,allMarkers=[],mapCounty=null,rankColored=false;
function initMap(){
  map=L.map("map",{zoomControl:true}).setView([23.7,121],7);
  const nlsc=L.tileLayer("https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}",
    {attribution:"© 內政部國土測繪中心",maxZoom:18,maxNativeZoom:20});
  const dark=L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    {attribution:"© OpenStreetMap, © CARTO",maxZoom:18});
  nlsc.addTo(map);
  L.control.layers({"中文地圖":nlsc,"暗色（英文）":dark},null,{position:"topright"}).addTo(map);
  cluster=L.markerClusterGroup({maxClusterRadius:45});
  allMarkers=[];
  for(const s of STATIONS){
    if(typeof s.lat!=="number") continue;
    const m=L.circleMarker([s.lat,s.lon],{radius:5,color:"#1d4ed8",weight:1.4,fillColor:"#3b82f6",fillOpacity:.85});
    m.bindTooltip(`${s.name}（${s.id}）<br>${s.county}`);
    m.on("click",()=>mapPick(s.id));
    allMarkers.push({id:s.id, county:s.county, lat:s.lat, lon:s.lon, m});
  }
  map.addLayer(cluster);
  filterMapByCounty("");
  setTimeout(()=>map.invalidateSize(),60);
  window.addEventListener("resize",()=>map.invalidateSize());
}
// 依縣市篩選地圖站點 + 自動縮放，避免在密集處點錯
function filterMapByCounty(county){
  if(!cluster) return;
  if(county===mapCounty) return;   // 沒變就不動，避免一直 reset 視野
  mapCounty=county;
  cluster.clearLayers();
  const sel=allMarkers.filter(o=>!county||o.county===county);
  cluster.addLayers(sel.map(o=>o.m));
  if(county && sel.length){
    map.fitBounds(L.latLngBounds(sel.map(o=>[o.lat,o.lon])).pad(0.15));
  }else if(!county){
    map.setView([23.7,121],7);
  }
}

/* ---------------- 底部結果抽屜 ---------------- */
function showSheet(){ $("#sheet").classList.add("show"); setTimeout(()=>chart&&chart.resize(),340); }
function hideSheet(){ $("#sheet").classList.remove("show"); }
$("#sheetClose").onclick=hideSheet;
$("#sheetToggle").onclick=()=>{ const s=$("#sheet"); s.classList.toggle("full");
  $("#sheetToggle").textContent = s.classList.contains("full")?"縮小 ⤡":"展開 ⤢";

function countySelect(id,cur){ return `<select id="${id}"><option value="">— 全部縣市 —</option>`+
  counties.map(c=>`<option ${c===cur?"selected":""}>${c}</option>`).join("")+`</select>`; }
function stationInput(id,listId,county,val){
  const opts=STATIONS.filter(x=>!county||x.county===county).map(x=>`<option value="${x.name}（${x.id}）">`).join("");
  return `<input id="${id}" list="${listId}" placeholder="打字找站名或站號…" value="${val||""}">
          <datalist id="${listId}">${opts}</datalist>`;
}
function resolveId(txt){ txt=(txt||"").trim();
  let m=txt.match(/（(.+?)）\s*$/)||txt.match(/\((.+?)\)\s*$/);
  if(m&&byId[m[1]])return m[1]; if(byId[txt])return txt;
  const h=STATIONS.find(s=>s.name===txt); return h?h.id:null; }

// 建立 flatpickr 區間選擇器
function fmtD(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function rangePicker(sel, defS, defE, onPick){
  const el=$(sel); if(!el||!window.flatpickr) return;
  flatpickr(el,{ mode:"range", locale:"zh", dateFormat:"Y-m-d",
    defaultDate:(defS&&defE)?[defS,defE]:null,
    onChange:(dates)=>{ if(dates.length===2) onPick(fmtD(dates[0]),fmtD(dates[1])); }});
}
function chipsHtml(items,title,cls){
  if(!items.length) return `<div class="empty-chip">尚未加入</div>`;
  return `<div class="chips" id="${cls}">`+items.map((it,i)=>`<div class="chip">
    <span class="dot" style="background:${it.color}"></span>
    <span class="t">${it.main}${it.sub?`<br><span class="sub">${it.sub}</span>`:""}</span>
    <button class="x" data-i="${i}">×</button></div>`).join("")+`</div>`;
}

function bindChipRemove(cls,fn){ const el=$("#"+cls); if(!el)return;

function addMultiStation(id){

/* ---------------- 取資料 ---------------- */
async function getDaily(id){
  if(!dailyCache[id]) dailyCache[id]=await fetch(`${DATA_BASE}/daily/${id}.json`).then(r=>r.json()).catch(()=>({daily:{}}));
  return dailyCache[id].daily||{};
}
async function getHourMonth(id,ym){ const k=id+"|"+ym;
  if(!hourlyCache[k]){
    try{
      const r=await fetch(`${HOURLY_BASE}/api/hourly?id=${encodeURIComponent(id)}&month=${ym}`,{signal:AbortSignal.timeout(75000)});
      hourlyCache[k]=(await r.json()).hourly||{};
    }catch(e){ hourBackendFailed=true; hourlyCache[k]={}; }
  }
  return hourlyCache[k]; }
function monthsBetween(s,e){const out=[];let y=+s.slice(0,4),m=+s.slice(5,7);const ey=+e.slice(0,4),em=+e.slice(5,7);
  while(y<ey||(y===ey&&m<=em)){out.push(`${y}-${pad(m)}`);m++;if(m>12){m=1;y++;}}return out;}
function pickElem(arr){ return Array.isArray(arr)? arr[curElem.idx] : null; }
function aggElem(vals){
  const nums=vals.filter(v=>typeof v==="number");
  if(!nums.length) return null;
  switch(curElem.agg){
    case "sum": return Math.round(nums.reduce((a,b)=>a+b,0)*10)/10;
    case "max": return Math.max(...nums);
    case "min": return Math.min(...nums);
    default:    return Math.round(nums.reduce((a,b)=>a+b,0)/nums.length*10)/10; // mean
  }
}
async function seriesPoints(sp){ // sp:{id,start,end}
  if(gran==="hour"){
    let rows=[];
    for(const ym of monthsBetween(sp.start,sp.end)){const h=await getHourMonth(sp.id,ym);
      for(const[t,arr]of Object.entries(h)) if(t.slice(0,10)>=sp.start&&t.slice(0,10)<=sp.end) rows.push([t,pickElem(arr)]);}
    return rows.sort((a,b)=>a[0]<b[0]?-1:1);
  }
  const daily=await getDaily(sp.id);
  let rows=Object.entries(daily).filter(([d])=>d>=sp.start&&d<=sp.end).map(([d,arr])=>[d,pickElem(arr)]);
  if(gran==="month"){const m={};for(const[d,v]of rows){const k=d.slice(0,7);(m[k]=m[k]||[]).push(v);}
    rows=Object.entries(m).map(([k,vals])=>[k,aggElem(vals)]);}
  return rows.sort((a,b)=>a[0]<b[0]?-1:1);
}

/* ---------------- 組系列 + 查詢 ---------------- */
function buildSeries(){
  if(mode==="multi"){
    const s=G.multi.start,e=G.multi.end;
    return {align:"date", list:G.multi.stations.map((st,i)=>({id:st.id,name:st.name,start:s,end:e,color:COLORS[i%8],label:st.name}))};
  }
  if(mode==="year"){
    const st=G.year.station; if(!st||!G.year.tmplS||!G.year.tmplE) return {align:"offset",list:[]};
    const mmS=G.year.tmplS.slice(5), mmE=G.year.tmplE.slice(5);
    return {align:"offset", list:G.year.years.map((y,i)=>
      ({id:st.id,name:st.name,start:`${y}-${mmS}`,end:`${y}-${mmE}`,color:COLORS[i%8],label:y+"年"}))};
  }
  const st=G.period.station; if(!st) return {align:"offset",list:[]};
  return {align:"offset", list:G.period.periods.map((p,i)=>({id:st.id,name:st.name,start:p.start,end:p.end,color:COLORS[i%8],label:p.start+"~"+p.end}))};
}

let hourBackendFailed=false;
function hourLoadHint(){ return gran==="hour" ? (STATIC?"（雲端逐時首次可能等後端喚醒 30-60 秒…）":"（逐時向 CODiS 現抓，請稍候）") : ""; }
async function runQuery(){
  if(mode==="rank") return runRank();
  if(mode==="disaster") return runDisaster();
  const {align,list}=buildSeries();
  if(!list.length){ $("#result").innerHTML=`<div class="empty">請先${mode==="multi"?"加入至少一個測站":"選測站並加入年份/時段"}。</div>`; showSheet(); return; }
  hourBackendFailed=false;
  $("#result").innerHTML=`<div class="empty">查詢中…${hourLoadHint()}</div>`; showSheet();
  const data=[];
  for(const sp of list){ const pts=await seriesPoints(sp); data.push({sp,pts,map:Object.fromEntries(pts)}); }
  if(gran==="hour"&&hourBackendFailed){ $("#result").innerHTML=hourBackendMsg(); showSheet(); return; }
  renderResult(align,data);
}

function uLab(){return gran==="hour"?"時":(gran==="month"?"月":"日");}
function statLine(pts){
  const nums=pts.map(p=>p[1]).filter(v=>typeof v==="number");
  if(!nums.length) return "此期間無資料";
  const u=curElem.unit, max=Math.max(...nums), min=Math.min(...nums);
  const sum=nums.reduce((a,b)=>a+b,0), mean=sum/nums.length;
  if(curElem.agg==="sum"){
    const wet=pts.filter(p=>typeof p[1]==="number"&&p[1]>0).length;
    return `總 ${sum.toFixed(1)}${u} · 最大 ${max.toFixed(1)}${u} · 有值 ${wet}/${pts.length}${uLab()}`;
  }
  return `均 ${mean.toFixed(1)}${u} · 最高 ${max.toFixed(1)}${u} · 最低 ${min.toFixed(1)}${u}`;
}
function renderResult(align,data){
  let labels,datasets,head,rows;
  if(align==="date"){
    const keys=[...new Set(data.flatMap(d=>d.pts.map(p=>p[0])))].sort();
    labels=keys;
    datasets=data.map(d=>({label:d.sp.label,data:keys.map(k=>d.map[k]==null?null:d.map[k]),
      borderColor:d.sp.color,backgroundColor:d.sp.color}));
    head=[gran==="hour"?"時間":(gran==="month"?"月份":"日期"),...data.map(d=>d.sp.label)];
    rows=keys.map(k=>[k,...data.map(d=>d.map[k]==null?"":d.map[k])]);
  }else{
    const maxN=Math.max(0,...data.map(d=>d.pts.length));
    labels=Array.from({length:maxN},(_,i)=>`第${i+1}${uLab()}`);
    datasets=data.map(d=>({label:d.sp.label,data:Array.from({length:maxN},(_,i)=>d.pts[i]?d.pts[i][1]:null),
      borderColor:d.sp.color,backgroundColor:d.sp.color}));
    head=["序",...data.map(d=>d.sp.label+`(${d.sp.start.slice(0,gran==="hour"?7:10)}起)`)];
    rows=Array.from({length:maxN},(_,i)=>[`第${i+1}${uLab()}`,...data.map(d=>d.pts[i]?(d.pts[i][1]==null?"":d.pts[i][1]):"")]);
  }
  lastRender={data,head,rows,align};

  const legend=data.map(d=>`<div class="lg"><span class="dot" style="background:${d.sp.color}"></span><span>
      <b>${d.sp.label}</b> <span class="s">${d.sp.name}（${d.sp.id}）</span><br>
      <span class="s">${statLine(d.pts)}</span></span></div>`).join("");

  $("#result").innerHTML=`<div class="legend">${legend}</div>
    <div class="chartbox"><canvas id="chart"></canvas></div>
    <div class="meta">${curElem.name}（${curElem.unit}） · ${data.length} 條系列 · ${gran==="hour"?"逐時":(gran==="month"?"逐月":"逐日")} · ${align==="date"?"按實際日期對齊":"按相對起點對齊"} · ${labels.length} 點</div>
    <div class="tablebox"><table>
      <thead><tr>${head.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${i>0&&curElem.agg==="sum"&&c!==""&&c>0?"wet":""}">${c===""?"–":c}</td>`).join("")}</tr>`).join("")}</tbody>
    </table></div>`;
  drawChart(labels,datasets);
  $("#xlsx").disabled=false; $("#csv").disabled=false; $("#png").disabled=false;
  $("#xlsx").onclick=exportXlsx; $("#csv").onclick=exportCsv;
  $("#sheetTitle").textContent=`${curElem.name} · ${data.length} 條系列 · ${gran==="hour"?"逐時":(gran==="month"?"逐月":"逐日")}`;
  showSheet();
}

function drawChart(labels,datasets){
  if(chart)chart.destroy();
  const u=curElem.unit;
  const type=curElem.chart;
  const zero=curElem.agg==="sum";  // 溫度等不從 0 起，雨量/日照從 0 起
  chart=new Chart($("#chart").getContext("2d"),{type,
    data:{labels,datasets:datasets.map(d=>({...d,borderWidth:type==="bar"?0:1.7,pointRadius:0,tension:.15,spanGaps:true}))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{labels:{color:"#cbd5e1",boxWidth:12,padding:14}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y==null?"–":c.parsed.y} ${u}`}}},
      scales:{x:{ticks:{color:"#94a3b8",maxTicksLimit:14,autoSkip:true},grid:{display:false}},
        y:{beginAtZero:zero,ticks:{color:"#94a3b8"},grid:{color:"#334155"},title:{display:true,text:u,color:"#94a3b8"}}}}
  });
}

/* ---------------- 災害分析 ---------------- */
async function runDisaster(){
  const st=G.disaster.station;
  if(!st){ $("#result").innerHTML=`<div class="empty">請先選一個測站。</div>`; showSheet(); return; }
  const ths=curThresholds();
  hourBackendFailed=false;
  $("#result").innerHTML=`<div class="empty">掃描 ${st.name} 的「${curElem.name}」災害事件中…${hourLoadHint()}</div>`; showSheet();
  const pts=await seriesPoints({id:st.id,start:G.disaster.start,end:G.disaster.end});
  if(gran==="hour"&&hourBackendFailed){ $("#result").innerHTML=hourBackendMsg(); showSheet(); return; }
  renderDisaster(st,pts,ths);
}
function renderDisaster(st,pts,ths){
  const u=curElem.unit, isBar=curElem.chart==="bar";
  const labels=pts.map(p=>p[0]), vals=pts.map(p=>p[1]);
  const below=!!(ths&&ths[0]&&ths[0].dir==="below");
  const datasets=[{type:isBar?"bar":"line",label:curElem.name,data:vals,borderColor:"#38bdf8",backgroundColor:"#38bdf8",borderWidth:isBar?0:1.6,pointRadius:0,tension:.15,spanGaps:true}];
  if(ths) for(const t of ths) datasets.push({type:"line",label:t.l,data:labels.map(()=>t.v),borderColor:t.c,borderDash:[6,4],borderWidth:1.3,pointRadius:0});

  const events=[]; pts.forEach(([d,v])=>{const lv=classify(v,ths); if(lv) events.push([d,v,lv]);});
  const valid=pts.filter(p=>typeof p[1]==="number");
  const ranking=[...valid].sort((a,b)=> below? a[1]-b[1] : b[1]-a[1]).slice(0,10);
  const cnt={}; if(ths) for(const t of ths) cnt[t.l]=events.filter(e=>e[2].l===t.l).length;

  lastRender={ data:[{sp:{name:st.name,id:st.id,start:G.disaster.start,end:G.disaster.end}}],
    head:[gran==="hour"?"時間":(gran==="month"?"月份":"日期"),`${curElem.name}(${u})`,"災害等級"],
    rows:pts.map(([d,v])=>{const lv=classify(v,ths);return [d,v==null?"":v,lv?lv.l:""];}), align:"date" };

  const sum = ths
    ? `<div class="legend">`+ths.map(t=>`<div class="lg"><span class="dot" style="background:${t.c}"></span><span><b>${t.l}</b><br><span class="s">${t.dir==="below"?"≤":"≥"}${t.v}${u} · ${cnt[t.l]||0} ${uLab()}</span></span></div>`).join("")+`</div>`
    : `<div class="meta">「${curElem.name}」無官方災害門檻；下方仍給極端排行。要看門檻警示請切雨量／最大陣風／最高溫／最低溫。</div>`;
  const hdLab=gran==="hour"?"時間":(gran==="month"?"月份":"日期");
  const evRows = events.length
    ? events.slice().sort((a,b)=> below? a[1]-b[1] : b[1]-a[1]).map(([d,v,lv])=>`<tr><td>${d}</td><td class="wet">${v}</td><td><span class="lvbadge" style="background:${lv.c}">${lv.l}</span></td></tr>`).join("")
    : `<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:18px">此期間沒有達到災害門檻 👍</td></tr>`;
  const rkRows = ranking.map(([d,v],i)=>{const lv=classify(v,ths);return `<tr><td>${i+1}</td><td>${d}</td><td class="wet">${v} ${u}</td><td>${lv?`<span class="lvbadge" style="background:${lv.c}">${lv.l}</span>`:""}</td></tr>`;}).join("");

  $("#result").innerHTML=`
    <div style="margin-bottom:12px"><b style="font-size:16px">${st.name}</b> <span class="s" style="color:var(--muted)">${st.id} · ${st.county} · ${curElem.name} · ${G.disaster.start}~${G.disaster.end}</span></div>
    ${sum}
    <div class="chartbox"><canvas id="chart"></canvas></div>
    <div class="meta">⚠️ 達標災害事件 ${events.length} 筆</div>
    <div class="tablebox" style="max-height:240px;margin-bottom:14px"><table>
      <thead><tr><th>${hdLab}</th><th>${curElem.name}(${u})</th><th>等級</th></tr></thead><tbody>${evRows}</tbody></table></div>
    <div class="meta">🏆 極端${below?"最低":"最高"}排行 Top ${ranking.length}</div>
    <div class="tablebox" style="max-height:260px"><table>
      <thead><tr><th>#</th><th>${hdLab}</th><th>${curElem.name}</th><th>等級</th></tr></thead><tbody>${rkRows}</tbody></table></div>`;

  if(chart) chart.destroy();
  chart=new Chart($("#chart").getContext("2d"),{data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{labels:{color:"#cbd5e1",boxWidth:12,padding:12}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y==null?"–":c.parsed.y} ${u}`}}},
      scales:{x:{ticks:{color:"#94a3b8",maxTicksLimit:14,autoSkip:true},grid:{display:false}},
        y:{beginAtZero:curElem.agg==="sum",ticks:{color:"#94a3b8"},grid:{color:"#334155"},title:{display:true,text:u,color:"#94a3b8"}}}}});
  $("#xlsx").disabled=false; $("#csv").disabled=false; $("#png").disabled=false;
  $("#xlsx").onclick=exportXlsx; $("#csv").onclick=exportCsv;
  $("#sheetTitle").textContent=`災害分析 · ${st.name} · ${curElem.name}`;
  showSheet();
}

/* ---------------- 全台排行 + 地圖熱度 ---------------- */
// 併發載入多站逐日（有快取者略過），onProg 回報進度
async function bulkLoadDaily(ids,onProg){
  let i=0,done=0; const pool=Math.min(16,ids.length);
  async function worker(){ while(i<ids.length){ const id=ids[i++];
    try{ await getDaily(id); }catch(e){} done++; if(onProg&&done%15===0)onProg(done,ids.length); } }
  await Promise.all(Array.from({length:pool},worker));
  onProg&&onProg(ids.length,ids.length);
}
// 雨量雷達風配色：0=淺藍 → 綠 → 黃 → 橙 → 紅 → 紫=最大
const RAMP=[[0,"#a3e0ff"],[.2,"#3b82f6"],[.4,"#22c55e"],[.55,"#eab308"],[.7,"#f97316"],[.85,"#ef4444"],[1,"#a21caf"]];
function lerpHex(a,b,f){ const pa=[1,3,5].map(i=>parseInt(a.slice(i,i+2),16)),pb=[1,3,5].map(i=>parseInt(b.slice(i,i+2),16));
  return "#"+pa.map((v,i)=>Math.round(v+(pb[i]-v)*f).toString(16).padStart(2,"0")).join(""); }
function rampColor(t){ t=Math.max(0,Math.min(1,t));
  for(let i=1;i<RAMP.length;i++){ if(t<=RAMP[i][0]){ const[t0,c0]=RAMP[i-1],[t1,c1]=RAMP[i]; return lerpHex(c0,c1,(t-t0)/((t1-t0)||1)); } }
  return RAMP[RAMP.length-1][1]; }
// 依排行結果替地圖測站著色；tmin(低溫)反轉色階讓「越冷越暖色」代表越極端
function colorMarkers(rows){
  const m=Object.fromEntries(rows.map(r=>[r.id,r.val]));
  const vals=rows.map(r=>r.val), mn=Math.min(...vals), mx=Math.max(...vals);
  const below=curElem.k==="tmin";
  rankColored=true;
  for(const o of allMarkers){ const v=m[o.id];
    if(v==null){ o.m.setStyle({radius:4,color:"#334155",weight:1,fillColor:"#475569",fillOpacity:.5}); }
    else { let t=mx>mn?(v-mn)/(mx-mn):.5; if(below)t=1-t;
      o.m.setStyle({radius:7,color:"#0b1220",weight:1,fillColor:rampColor(t),fillOpacity:.92}); } }
}
function resetMarkers(){ if(!rankColored)return; rankColored=false;
  for(const o of allMarkers) o.m.setStyle({radius:5,color:"#1d4ed8",weight:1.4,fillColor:"#3b82f6",fillOpacity:.85}); }

async function runRank(){
  const cty=G.rank.county, s=G.rank.start, e=G.rank.end;
  if(!s||!e){ $("#result").innerHTML=`<div class="empty">請先選時間範圍。</div>`; showSheet(); return; }
  const list=STATIONS.filter(x=>typeof x.lat==="number" && (!cty||x.county===cty));
  if(!list.length){ $("#result").innerHTML=`<div class="empty">此範圍沒有測站。</div>`; showSheet(); return; }
  showSheet();
  await bulkLoadDaily(list.map(x=>x.id),(d,n)=>{ $("#result").innerHTML=`<div class="empty">${cty||"全台"}掃描中…<br>已載入 ${d}/${n} 站</div>`; });
  const rows=[];
  for(const st of list){ const daily=await getDaily(st.id);
    const vals=Object.entries(daily).filter(([d])=>d>=s&&d<=e).map(([d,arr])=>pickElem(arr)).filter(v=>typeof v==="number");
    if(!vals.length) continue;
    rows.push({id:st.id,name:st.name,county:st.county,val:aggElem(vals)});
  }
  const below=curElem.k==="tmin";
  rows.sort((a,b)=> below? a.val-b.val : b.val-a.val);
  if(mode==="rank") colorMarkers(rows);   // 使用者可能中途切模式
  renderRank(rows);
}
function renderRank(rows){
  const u=curElem.unit, cty=G.rank.county||"全台", below=curElem.k==="tmin";
  if(!rows.length){ $("#result").innerHTML=`<div class="empty">此期間全部測站都沒有「${curElem.name}」資料。</div>`; showSheet(); return; }
  const vals=rows.map(r=>r.val), mn=Math.min(...vals), mx=Math.max(...vals);
  const body=rows.map((r,i)=>{ let t=mx>mn?(r.val-mn)/(mx-mn):.5; if(below)t=1-t;
    return `<tr><td>${i+1}</td><td><span class="dot" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${rampColor(t)};margin-right:7px;vertical-align:middle"></span>${r.name}</td><td>${r.county}</td><td class="wet">${r.val} ${u}</td></tr>`; }).join("");
  $("#result").innerHTML=`
    <div style="margin-bottom:10px"><b style="font-size:16px">${cty} · ${curElem.name}排行</b>
      <span class="s" style="color:var(--muted)">${G.rank.start} ~ ${G.rank.end} · ${rows.length} 站有資料 · 🗺 地圖已同步著色</span></div>
    <div class="meta">🏆 ${below?"最低":"最高"}排行（第 1 名＝${below?"最極端低值":"最極端高值"}；放大地圖看各站顏色）</div>
    <div class="tablebox" style="max-height:54vh"><table>
      <thead><tr><th>#</th><th>測站</th><th>縣市</th><th>${curElem.name}(${u})</th></tr></thead>
      <tbody>${body}</tbody></table></div>`;
  lastRender={ data:[{sp:{name:cty,id:"-",start:G.rank.start,end:G.rank.end}}],
    head:["#","測站","縣市",`${curElem.name}(${u})`],
    rows:rows.map((r,i)=>[i+1,r.name,r.county,r.val]), align:"date" };
  $("#xlsx").disabled=false; $("#csv").disabled=false; $("#png").disabled=true;  // 排行無圖表
  $("#xlsx").onclick=exportXlsx; $("#csv").onclick=exportCsv;
  $("#sheetTitle").textContent=`排行 · ${cty} · ${curElem.name}`;
  showSheet();
}

/* ---------------- 分享連結 / 圖片匯出 / 提示 ---------------- */
function toast(msg){ let t=$("#toast");
  if(!t){ t=document.createElement("div"); t.id="toast";
    t.style.cssText="position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#0ea5e9;color:#fff;padding:10px 20px;border-radius:10px;z-index:9999;font-size:14px;box-shadow:0 8px 28px rgba(0,0,0,.45);transition:opacity .3s;opacity:0";
    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity="1"; clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity="0",1900); }
function buildShareUrl(){
  const p=new URLSearchParams();
  p.set("m",mode); p.set("g",gran); p.set("e",String(ELEMS.indexOf(curElem)));
  if(mode==="multi"){ p.set("st",G.multi.stations.map(s=>s.id).join(",")); p.set("s",G.multi.start); p.set("t",G.multi.end); }
  else if(mode==="year"){ if(G.year.station)p.set("st",G.year.station.id); p.set("ts",G.year.tmplS); p.set("te",G.year.tmplE); p.set("yr",G.year.years.join(",")); }
  else if(mode==="period"){ if(G.period.station)p.set("st",G.period.station.id); p.set("pd",G.period.periods.map(x=>x.start+"~"+x.end).join(",")); }
  else if(mode==="disaster"){ if(G.disaster.station)p.set("st",G.disaster.station.id); p.set("s",G.disaster.start); p.set("t",G.disaster.end); }
  else if(mode==="rank"){ p.set("c",G.rank.county); p.set("s",G.rank.start); p.set("t",G.rank.end); }
  return location.origin+location.pathname+"#"+p.toString();
}
function applyShareUrl(){
  if(!location.hash||location.hash.length<2) return false;
  const p=new URLSearchParams(location.hash.slice(1));
  const m=p.get("m"); if(!m) return false;
  mode=m; gran=p.get("g")||"day";
  const ei=+p.get("e"); if(ei>=0&&ei<ELEMS.length){ curElem=ELEMS[ei]; if($("#elem"))$("#elem").value=ei; }
  [...$("#mode").children].forEach(b=>b.classList.toggle("on",b.dataset.m===mode));
  [...$("#gran").children].forEach(b=>b.classList.toggle("on",b.dataset.g===gran));
  const stId=p.get("st"), mk=id=>({id,name:byId[id].name,county:byId[id].county});
  if(m==="multi"){ G.multi.stations=(stId?stId.split(","):[]).filter(id=>byId[id]).map(mk); if(p.get("s"))G.multi.start=p.get("s"); if(p.get("t"))G.multi.end=p.get("t"); }
  else if(m==="year"){ if(stId&&byId[stId])G.year.station=mk(stId); if(p.get("ts"))G.year.tmplS=p.get("ts"); if(p.get("te"))G.year.tmplE=p.get("te"); if(p.get("yr"))G.year.years=p.get("yr").split(",").map(Number).filter(Boolean); }
  else if(m==="period"){ if(stId&&byId[stId])G.period.station=mk(stId); if(p.get("pd"))G.period.periods=p.get("pd").split(",").filter(Boolean).map(x=>{const[a,b]=x.split("~");return{start:a,end:b};}); }
  else if(m==="disaster"){ if(stId&&byId[stId])G.disaster.station=mk(stId); if(p.get("s"))G.disaster.start=p.get("s"); if(p.get("t"))G.disaster.end=p.get("t"); }
  else if(m==="rank"){ G.rank.county=p.get("c")||""; if(p.get("s"))G.rank.start=p.get("s"); if(p.get("t"))G.rank.end=p.get("t"); }
  return true;
}
function exportPng(){
  const src=$("#chart"); if(!src){ toast("目前沒有圖表可存"); return; }
  if(!src.width||!src.height){ toast("圖表還沒畫好，請稍等再存"); return; }  // 防呆：畫布尚未有尺寸
  const tmp=document.createElement("canvas"); tmp.width=src.width; tmp.height=src.height;
  const ctx=tmp.getContext("2d");
  ctx.fillStyle=(getComputedStyle(document.body).getPropertyValue("--panel")||"#1e293b").trim();
  ctx.fillRect(0,0,tmp.width,tmp.height); ctx.drawImage(src,0,0);
  const a=document.createElement("a"); a.href=tmp.toDataURL("image/png");
  a.download=`${curElem.name}_${gran}_${new Date().toISOString().slice(0,10)}.png`; a.click();
  toast("🖼 圖片已下載");
}
function wireExtras(){
  $("#share").onclick=async()=>{ const url=buildShareUrl();
    try{ await navigator.clipboard.writeText(url); toast("🔗 分享連結已複製，貼給別人即可看到同一張圖"); }
    catch(e){ prompt("複製這個分享連結：",url); } };
  $("#png").onclick=exportPng;
}

/* ---------------- 匯出 ---------------- */
function aoa(){ const {data,head,rows}=lastRender;
  const meta=[`${curElem.name}(${curElem.unit})對比`,...data.map(d=>`${d.sp.name}(${d.sp.id}) ${d.sp.start}~${d.sp.end}`)];
  return [meta,head,...rows.map(r=>r.map(c=>c===""?null:c))]; }
function exportXlsx(){ const ws=XLSX.utils.aoa_to_sheet(aoa());const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,curElem.name);
  XLSX.writeFile(wb,`${curElem.name}對比_${gran}_${new Date().toISOString().slice(0,10)}.xlsx`); }
function exportCsv(){ const {head,rows}=lastRender;
  const csv=[head.join(","),...rows.map(r=>r.join(","))].join("\n");
  const b=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`${curElem.name}對比_${gran}.csv`;a.click(); }

boot();
</script>
